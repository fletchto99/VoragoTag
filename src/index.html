<!DOCTYPE html>
<html>
<head>
	<style>
	body {
		margin: 0;
		padding: 4px;
		font-family: sans-serif;
		background: #1a1a1a;
		color: #fff;
	}
	.voragoTimer {
		width: 100%;
		margin-top: 4px;
		display: flex;
		gap: 3px;
	}
	.barSection {
		position: relative;
		background-color: #333;
		height: 16px;
		overflow: hidden;
	}
	.barLabel {
		position: absolute;
		top: 0;
		left: 0;
		width: 100%;
		height: 100%;
		display: flex;
		align-items: center;
		justify-content: center;
		font-size: 11px;
		font-weight: bold;
		color: #fff;
		text-shadow: 0 0 2px #000, 0 0 2px #000;
		pointer-events: none;
	}
	#preUlt {
		flex: 15 0 0;
		border-radius: 3px 0 0 3px;
	}
	#Ult {
		flex: 0.6 0 0;
		min-width: 30px;
	}
	#postUlt {
		flex: 9 0 0;
		border-radius: 0 3px 3px 0;
	}
	.voragoTimerBar {
		height: 100%;
		width: 0%;
		background-color: #b8860b;
		transition: width 0.1s;
	}
	#demoBtn {
		display: none;
		margin-top: 6px;
		padding: 4px 10px;
		font-size: 12px;
		font-weight: bold;
		color: #fff;
		background-color: #b8860b;
		border: none;
		border-radius: 3px;
		cursor: pointer;
	}
	#demoBtn:hover {
		background-color: #d4a017;
	}
	</style>
</head>
<body>
	<span id="remaining_time" style="font-size:14px;font-weight:bold;">0.0s</span>
	<div class="voragoTimer">
		<div class="barSection" id="preUlt">
			<div class="voragoTimerBar" id="preUltBar"></div>
			<span class="barLabel">pre-ult</span>
		</div>
		<div class="barSection" id="Ult">
			<div class="voragoTimerBar" id="UltBar"></div>
			<span class="barLabel">ult</span>
		</div>
		<div class="barSection" id="postUlt">
			<div class="voragoTimerBar" id="postUltBar"></div>
			<span class="barLabel">post-ult</span>
		</div>
	</div>
	<button id="demoBtn" type="button">Start demo timer</button>
	<script src="./main.js"></script>
</body>
</html>
